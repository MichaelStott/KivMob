# Build and smoke-test banner ads — same as: make android-test-banner
name: Android — Banner Tests

on:
  push:
    branches: [master, main]
    paths:
      - "tests/android_ci/banner/**"
      - "changelog/**"
      - "CHANGELOG.md"
      - "scripts/version.py"
      - "tests/android_ci/buildozer.spec.in"
      - "kivmob.py"
      - "bridges/android/**"
      - "scripts/ci/**"
      - "docker-compose.android.yml"
      - ".github/workflows/android-ad-banner.yml"
      - ".github/workflows/android-ad-test-reusable.yml"
  pull_request:
    paths:
      - "tests/android_ci/banner/**"
      - "changelog/**"
      - "CHANGELOG.md"
      - "scripts/version.py"
      - "tests/android_ci/buildozer.spec.in"
      - "kivmob.py"
      - "bridges/android/**"
      - "scripts/ci/**"
      - "docker-compose.android.yml"
      - ".github/workflows/android-ad-banner.yml"
      - ".github/workflows/android-ad-test-reusable.yml"
  workflow_dispatch:

concurrency:
  group: android-ad-banner-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-test:
    uses: ./.github/workflows/android-ad-test-reusable.yml
    with:
      app: banner
