# Build and smoke-test interstitial ads — same as: make android-test-interstitial
name: Android — Interstitial Tests

on:
  push:
    branches: [master, main]
    paths:
      - "tests/android_ci/interstitial/**"
      - "changelog/**"
      - "CHANGELOG.md"
      - "scripts/version.py"
      - "tests/android_ci/buildozer.spec.in"
      - "kivmob.py"
      - "bridges/android/**"
      - "scripts/ci/**"
      - "docker-compose.android.yml"
      - ".github/workflows/android-ad-interstitial.yml"
      - ".github/workflows/android-ad-test-reusable.yml"
  pull_request:
    paths:
      - "tests/android_ci/interstitial/**"
      - "changelog/**"
      - "CHANGELOG.md"
      - "scripts/version.py"
      - "tests/android_ci/buildozer.spec.in"
      - "kivmob.py"
      - "bridges/android/**"
      - "scripts/ci/**"
      - "docker-compose.android.yml"
      - ".github/workflows/android-ad-interstitial.yml"
      - ".github/workflows/android-ad-test-reusable.yml"
  workflow_dispatch:

concurrency:
  group: android-ad-interstitial-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-test:
    uses: ./.github/workflows/android-ad-test-reusable.yml
    with:
      app: interstitial
