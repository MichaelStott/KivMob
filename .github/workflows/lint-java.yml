name: Lint — Java (Android bridge)

on:
  push:
    branches: [master, main]
    paths:
      - "bridges/android/**"
      - ".github/workflows/lint-java.yml"
  pull_request:
    paths:
      - "bridges/android/**"
      - ".github/workflows/lint-java.yml"
  workflow_dispatch:

concurrency:
  group: lint-java-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Run Gradle check on Android bridge
        run: |
          chmod +x bridges/android/gradlew
          cd bridges/android
          ./gradlew :kivmob-android-bridge:check --no-daemon
